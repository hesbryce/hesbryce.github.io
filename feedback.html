<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>App Feedback – IRL Health Bar</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon.ico">

  <link rel="stylesheet" href="style.css" />

  <style>
    .feedback-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10rem 40px 6rem 40px;
      text-align: center;
    }

    .feedback-page h1 {
      font-size: clamp(3rem, 7vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: white;
      margin: 0 0 2rem 0;
    }

    .feedback-page .subtitle {
      font-size: clamp(1.25rem, 1.8vw, 1.75rem);
      color: rgba(255, 255, 255, 0.65);
      max-width: 800px;
      margin: 0 0 5rem 0;
      font-weight: 500;
      line-height: 1.5;
    }

    .feedback-cta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.95);
      color: #0f172a;
      font-size: clamp(1.1rem, 1.5vw, 1.5rem);
      font-weight: 700;
      padding: clamp(1.1rem, 1.6vw, 1.6rem) clamp(2.5rem, 4vw, 3.5rem);
      border-radius: 999px;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .feedback-cta:hover {
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.3);
    }

    .feedback-cta:active {
      transform: translateY(0);
    }

    .opens-in-new {
      margin-top: 1.5rem;
      font-size: clamp(0.85rem, 1vw, 1rem);
      color: rgba(255, 255, 255, 0.3);
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .feedback-page {
        padding: 6rem 20px 3rem 20px;
      }
      .feedback-page .subtitle {
        margin-bottom: 3rem;
      }
    }
  </style>
</head>
<body>

  <nav class="modern-navbar">
    <div class="nav-container">
      <button class="hamburger-menu" id="hamburger-menu" onclick="toggleMobileMenu()" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-brand">
        <a href="index.html" style="text-decoration:none;">
          <h1 class="brand-name">IRL Health Bar</h1>
        </a>
      </div>
      <div class="nav-links desktop-only">
        <a href="download.html" class="nav-link">Download App</a>
        <a href="professional.html" class="nav-link">Dashboard</a>
        <a href="feedback.html" class="nav-link active">Feedback</a>
      </div>
      <a href="/payment/index.html" class="nav-link nav-cta">Subscriptions</a>
    </div>
    <div class="mobile-menu-overlay" id="mobile-menu-overlay" onclick="toggleMobileMenu()"></div>
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-header">
        <h2>Menu</h2>
        <button class="close-menu" onclick="toggleMobileMenu()" aria-label="Close menu">&times;</button>
      </div>
      <div class="mobile-menu-links">
        <a href="download.html" class="mobile-menu-link" onclick="toggleMobileMenu()">Download App</a>
        <a href="professional.html" class="mobile-menu-link" onclick="toggleMobileMenu()">Dashboard</a>
        <a href="feedback.html" class="mobile-menu-link" onclick="toggleMobileMenu()">Feedback</a>
      </div>
    </div>
  </nav>

  <main class="feedback-page">
    <h1>We'd love your feedback.</h1>
    <p class="subtitle">Help us fix bugs, ship better features, and build the app you actually want.</p>
    <a
      href="https://docs.google.com/forms/d/e/1FAIpQLSdLT_O22rwcKvclBQyTfW1YPiAsoCQH48P05wRiSCqzV-wuUA/viewform"
      target="_blank"
      rel="noopener noreferrer"
      class="feedback-cta"
    >
      Open Feedback Form ↗
    </a>
    <p class="opens-in-new">Opens in a new tab</p>
  </main>

  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      const overlay = document.getElementById('mobile-menu-overlay');
      const hamburger = document.getElementById('hamburger-menu');
      const isOpen = menu.classList.contains('active');
      menu.classList.toggle('active', !isOpen);
      overlay.classList.toggle('active', !isOpen);
      hamburger.classList.toggle('active', !isOpen);
      document.body.style.overflow = !isOpen ? 'hidden' : '';
    }

    window.addEventListener('scroll', () => {
      const navbar = document.querySelector('.modern-navbar');
      if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>

</body>
</html>
