<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Korrect Fitness — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="korrectfitness.css">
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-logo">
      <img src="https://irlhealthbar.com/korrect-fitness-logo.png"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"
           alt="Korrect Fitness">
      <span style="display:none; font-size:17px; font-weight:700; letter-spacing:-.3px;">Korrect Fitness</span>
    </div>
    <div class="nav-right">
      <button class="nav-wod-toggle" id="wod-toggle-btn" onclick="toggleWOD()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="2" width="5" height="12" rx="1.5"/>
          <rect x="9" y="2" width="5" height="12" rx="1.5"/>
        </svg>
        WOD
      </button>
      <div class="live-pill"><div class="live-dot"></div>Live</div>
    </div>
  </div>
</nav>

<!-- ── SPLIT ROOT ───────────────────────────────────────── -->
<div class="split-root" id="split-root">

  <!-- Health Bar Pane -->
  <div class="pane-health" id="pane-health">
    <div class="page">

      <div class="stats">
        <div class="stat-card">
          <div class="stat-val" id="client-count">0</div>
          <div class="stat-lbl">Active Clients</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="avg-health">--</div>
          <div class="stat-lbl">Group Avg Health</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="last-refresh">--</div>
          <div class="stat-lbl">Last Update</div>
        </div>
      </div>

      <div class="add-section">
        <div class="add-label">Add Client</div>
        <form class="add-form" onsubmit="event.preventDefault(); handleAdd();">
          <input id="code-input" class="field" type="text" placeholder="Share Code" maxlength="8" required autocomplete="off" />
          <input id="name-input" class="field" type="text" placeholder="Name (optional)" autocomplete="off" />
          <button type="submit" class="add-btn">Add</button>
        </form>
      </div>

      <div class="clients-section">
        <div class="section-header">
          <span class="section-title">Clients</span>
          <div class="hdr-btns">
            <button class="ghost-btn" id="show-hidden-btn" onclick="toggleShowHidden()">Show Hidden</button>
            <button class="ghost-btn" onclick="refreshClients()">Refresh</button>
            <button class="ghost-btn" onclick="clearAll()">Clear All</button>
          </div>
        </div>
        <div id="clients-grid" class="clients-grid"></div>
      </div>

    </div>
  </div>

  <!-- Drag Handle -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- WOD Pane -->
  <div class="pane-wod" id="pane-wod">
    <div class="wod-pane">

      <div class="wod-header">
        <div class="wod-header-top">
          <div class="wod-title">
            <div class="wod-title-dot"></div>
            Workout of the Day
          </div>
          <div class="wod-date" id="wod-date"></div>
        </div>
        <div class="wod-actions">
          <button class="wod-action-btn" onclick="clearWOD()">Clear</button>
          <button class="wod-action-btn" onclick="copyWOD()">Copy</button>
          <button class="wod-action-btn primary" onclick="saveWOD()">Save</button>
          <div class="wod-mode-bar">
            <button class="wod-mode-btn active" id="mode-edit" onclick="setMode('edit')">Edit</button>
            <button class="wod-mode-btn" id="mode-display" onclick="setMode('display')">View</button>
          </div>
        </div>
      </div>

      <!-- Edit mode -->
      <div class="wod-body" id="wod-edit-body">

        <div class="wod-block block-warm" id="block-warm">
          <div class="wod-block-hdr" onclick="toggleBlock('block-warm')">
            <div class="wod-block-label-row">
              <div class="wod-block-dot"></div>
              <span class="wod-block-label">Warm Up</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="wod-block-preview" id="preview-warm"></span>
              <span class="wod-block-chevron">▾</span>
            </div>
          </div>
          <div class="wod-block-body">
            <textarea class="wod-textarea" id="wod-warm"
              placeholder="e.g. 3 rounds&#10;10 air squats&#10;10 push-ups&#10;200m jog"
              oninput="updatePreview('warm', this.value)"
              rows="5"></textarea>
          </div>
        </div>

        <div class="wod-block block-a" id="block-a">
          <div class="wod-block-hdr" onclick="toggleBlock('block-a')">
            <div class="wod-block-label-row">
              <div class="wod-block-dot"></div>
              <span class="wod-block-label">Block A</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="wod-block-preview" id="preview-a"></span>
              <span class="wod-block-chevron">▾</span>
            </div>
          </div>
          <div class="wod-block-body">
            <textarea class="wod-textarea" id="wod-a"
              placeholder="e.g. AMRAP 12 min&#10;5 deadlifts @ 225/155&#10;10 box jumps 24/20&#10;15 KB swings 53/35"
              oninput="updatePreview('a', this.value)"
              rows="5"></textarea>
          </div>
        </div>

        <div class="wod-block block-b" id="block-b">
          <div class="wod-block-hdr" onclick="toggleBlock('block-b')">
            <div class="wod-block-label-row">
              <div class="wod-block-dot"></div>
              <span class="wod-block-label">Block B</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="wod-block-preview" id="preview-b"></span>
              <span class="wod-block-chevron">▾</span>
            </div>
          </div>
          <div class="wod-block-body">
            <textarea class="wod-textarea" id="wod-b"
              placeholder="e.g. 4x8 back squat @ 75%&#10;Rest 90s between sets"
              oninput="updatePreview('b', this.value)"
              rows="5"></textarea>
          </div>
        </div>

        <div class="wod-block block-finish" id="block-finish">
          <div class="wod-block-hdr" onclick="toggleBlock('block-finish')">
            <div class="wod-block-label-row">
              <div class="wod-block-dot"></div>
              <span class="wod-block-label">Finisher</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="wod-block-preview" id="preview-finish"></span>
              <span class="wod-block-chevron">▾</span>
            </div>
          </div>
          <div class="wod-block-body">
            <textarea class="wod-textarea" id="wod-finish"
              placeholder="e.g. 1 min max burpees&#10;1 min rest&#10;x3"
              oninput="updatePreview('finish', this.value)"
              rows="4"></textarea>
          </div>
        </div>

        <div class="wod-block block-cool" id="block-cool">
          <div class="wod-block-hdr" onclick="toggleBlock('block-cool')">
            <div class="wod-block-label-row">
              <div class="wod-block-dot"></div>
              <span class="wod-block-label">Cool Down</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="wod-block-preview" id="preview-cool"></span>
              <span class="wod-block-chevron">▾</span>
            </div>
          </div>
          <div class="wod-block-body">
            <textarea class="wod-textarea" id="wod-cool"
              placeholder="e.g. 5 min easy walk&#10;Hip flexor stretch 60s/side&#10;Pigeon pose 90s/side"
              oninput="updatePreview('cool', this.value)"
              rows="4"></textarea>
          </div>
        </div>

      </div><!-- /wod-edit-body -->

      <!-- Display / View mode -->
      <div class="wod-body" id="wod-display-body" style="display:none">
        <div class="wod-display" id="wod-display"></div>
      </div>

    </div>
  </div><!-- /pane-wod -->

</div><!-- /split-root -->

<!-- Rename Modal -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <div class="modal-title">Rename Client</div>
    <div class="modal-sub">Update the display name for this client</div>
    <input class="modal-input" id="modal-input" placeholder="Name" maxlength="40" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const API = 'https://stamina-api.onrender.com';
const CK  = 'kf_clients';
const HK  = 'kf_hidden';
const WK  = 'kf_wod';

let timer   = null;
let showH   = false;
let renaming = null;
let wodOpen = false;

/* ═══════════════════════════════════════════════════
   UTIL
═══════════════════════════════════════════════════ */
function escapeHtml(str) {
  const map = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' };
  return String(str).replace(/[&<>"']/g, c => map[c]);
}

const colorMap = {
  'blue':         '#1f6feb',
  'green':        '#30d158',
  'green-yellow': '#7ac943',
  'yellow':       '#ffd60a',
  'yellow-orange':'#ff9f0a',
  'orange':       '#ff6b00',
  'red':          '#ff453a'
};

const gc = () => JSON.parse(localStorage.getItem(CK) || '[]');
const sc = v  => localStorage.setItem(CK, JSON.stringify(v));
const gh = () => new Set(JSON.parse(localStorage.getItem(HK) || '[]'));
const sh = v  => localStorage.setItem(HK, JSON.stringify([...v]));

/* ═══════════════════════════════════════════════════
   WOD PANEL
═══════════════════════════════════════════════════ */
const WOD_BLOCKS = [
  { key: 'warm',   label: 'Warm Up'   },
  { key: 'a',      label: 'Block A'   },
  { key: 'b',      label: 'Block B'   },
  { key: 'finish', label: 'Finisher'  },
  { key: 'cool',   label: 'Cool Down' },
];

function toggleWOD() {
  wodOpen = !wodOpen;
  const root    = document.getElementById('split-root');
  const btn     = document.getElementById('wod-toggle-btn');
  root.classList.toggle('wod-open', wodOpen);
  btn.classList.toggle('active', wodOpen);
  if (wodOpen) loadWOD();
}

function setMode(mode) {
  const editBody    = document.getElementById('wod-edit-body');
  const displayBody = document.getElementById('wod-display-body');
  const editBtn     = document.getElementById('mode-edit');
  const dispBtn     = document.getElementById('mode-display');

  if (mode === 'edit') {
    editBody.style.display    = 'flex';
    displayBody.style.display = 'none';
    editBtn.classList.add('active');
    dispBtn.classList.remove('active');
  } else {
    editBody.style.display    = 'none';
    displayBody.style.display = 'flex';
    editBtn.classList.remove('active');
    dispBtn.classList.add('active');
    renderDisplay();
  }
}

function renderDisplay() {
  const container = document.getElementById('wod-display');
  container.innerHTML = WOD_BLOCKS.map(b => {
    const val = document.getElementById('wod-' + b.key)?.value.trim() || '';
    const block = document.querySelector('.block-' + (b.key === 'finish' ? 'finish' : b.key === 'cool' ? 'cool' : b.key === 'warm' ? 'warm' : b.key));
    // get color from CSS var via class
    const colorClass = {warm:'#ff6b6b', a:'#5e9cf5', b:'#a78bfa', finish:'#ff9f0a', cool:'#34d399'};
    const c = colorClass[b.key] || '#888';
    return `<div class="display-block">
      <div class="display-label" style="color:${c}">${escapeHtml(b.label)}</div>
      <div class="display-content${val ? '' : ' empty'}">${val ? escapeHtml(val) : 'Nothing written yet'}</div>
    </div>`;
  }).join('');
}

function updatePreview(key, val) {
  const el = document.getElementById('preview-' + key);
  if (!el) return;
  const first = val.trim().split('\n')[0];
  el.textContent = first ? first.slice(0, 30) + (first.length > 30 ? '…' : '') : '';
}

function toggleBlock(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function saveWOD() {
  const data = {};
  WOD_BLOCKS.forEach(b => {
    data[b.key] = document.getElementById('wod-' + b.key)?.value || '';
  });
  localStorage.setItem(WK, JSON.stringify(data));
  toast('WOD saved');
}

function loadWOD() {
  try {
    const data = JSON.parse(localStorage.getItem(WK) || '{}');
    WOD_BLOCKS.forEach(b => {
      const el = document.getElementById('wod-' + b.key);
      if (el && data[b.key]) {
        el.value = data[b.key];
        updatePreview(b.key, data[b.key]);
      }
    });
  } catch(e) {}
}

function clearWOD() {
  if (!confirm('Clear today\'s WOD?')) return;
  WOD_BLOCKS.forEach(b => {
    const el = document.getElementById('wod-' + b.key);
    if (el) { el.value = ''; updatePreview(b.key, ''); }
  });
  localStorage.removeItem(WK);
  toast('WOD cleared');
}

function copyWOD() {
  const today = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  let text = `🏋️ WOD — ${today}\n\n`;
  WOD_BLOCKS.forEach(b => {
    const val = document.getElementById('wod-' + b.key)?.value.trim();
    if (val) text += `[ ${b.label.toUpperCase()} ]\n${val}\n\n`;
  });
  navigator.clipboard.writeText(text.trim())
    .then(() => toast('WOD copied to clipboard'))
    .catch(() => toast('Copy failed', true));
}

/* ═══════════════════════════════════════════════════
   RESIZE DRAG
═══════════════════════════════════════════════════ */
(function() {
  const handle = document.getElementById('resize-handle');
  const paneW  = document.getElementById('pane-wod');
  let dragging = false;
  let startX, startW;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = paneW.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX;
    const newW  = Math.max(280, Math.min(window.innerWidth * 0.6, startW + delta));
    paneW.style.flexBasis = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ═══════════════════════════════════════════════════
   DATE
═══════════════════════════════════════════════════ */
document.getElementById('wod-date').textContent = new Date().toLocaleDateString('en-US', {
  weekday:'long', month:'short', day:'numeric'
});

/* ═══════════════════════════════════════════════════
   CLIENT LOGIC (unchanged from original)
═══════════════════════════════════════════════════ */
async function handleAdd() {
  const ci   = document.getElementById('code-input');
  const ni   = document.getElementById('name-input');
  const code = ci.value.trim().toUpperCase();
  const name = ni.value.trim();
  if (!/^[A-Z0-9]{8}$/.test(code)) { toast('Enter a valid 8-character code', true); return; }
  const clients = gc();
  if (clients.some(c => c.code === code)) { toast('Already added', true); return; }
  try {
    const r = await fetch(`${API}/${code}`);
    if (!r.ok) throw new Error('Code not found');
    clients.push({ code, name: name || 'Client ' + code.slice(0,4), addedAt: Date.now() });
    sc(clients);
    ci.value = ''; ni.value = '';
    toast('Client added');
    await renderClients();
    startTimer();
  } catch(e) { toast(e.message, true); }
}

function removeClient(code) {
  if (!confirm('Remove this client?')) return;
  const h = gh(); h.delete(code); sh(h);
  sc(gc().filter(c => c.code !== code));
  const card = document.getElementById('c-' + code);
  if (card) card.remove();
  if (!gc().length) stopTimer();
  updateStats(); checkEmpty();
  toast('Client removed');
}

function toggleHide(code) {
  const h = gh();
  h.has(code) ? h.delete(code) : h.add(code);
  sh(h);
  const card = document.getElementById('c-' + code);
  if (card) setHidden(card, code, h);
}

function setHidden(card, code, h) {
  const isHid = h.has(code);
  card.classList.toggle('is-hidden', isHid && !showH);
  const btn = card.querySelector('.hide-btn');
  if (btn) btn.textContent = isHid ? '○' : '−';
  btn && (btn.title = isHid ? 'Unhide' : 'Hide');
}

function toggleShowHidden() {
  showH = !showH;
  const btn = document.getElementById('show-hidden-btn');
  btn.classList.toggle('on', showH);
  btn.textContent = showH ? 'Hide Hidden' : 'Show Hidden';
  const h = gh();
  document.querySelectorAll('.client-card').forEach(card => {
    setHidden(card, card.id.replace('c-',''), h);
  });
}

function openRename(code) {
  renaming = code;
  const c = gc().find(c => c.code === code);
  document.getElementById('modal-input').value = c ? c.name : '';
  document.getElementById('rename-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}
function closeModal() {
  document.getElementById('rename-modal').classList.remove('open');
  renaming = null;
}
function confirmRename() {
  if (!renaming) return;
  const val = document.getElementById('modal-input').value.trim();
  if (!val) { toast('Enter a name', true); return; }
  const clients = gc();
  const c = clients.find(c => c.code === renaming);
  if (c) { c.name = val; sc(clients); }
  const el = document.querySelector('#c-' + renaming + ' .card-name');
  if (el) el.textContent = val;
  closeModal();
  toast('Renamed');
}

document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('rename-modal').addEventListener('click', e => {
  if (e.target.id === 'rename-modal') closeModal();
});

async function fetchData(code) {
  try {
    const r = await fetch(`${API}/${code}`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

function patchCard(card, data) {
  if (!data) return;
  const color = colorMap[data.color] || colorMap.green;
  const fill  = card.querySelector('.bar-fill');
  const label = card.querySelector('.bar-label');
  if (fill)  { fill.style.width = data.stamina_score + '%'; fill.style.background = color; }
  if (label) { label.textContent = data.stamina_score + '%'; }
  const group = card.querySelector('.live-group');
  const dot   = card.querySelector('.status-dot');
  const txt   = card.querySelector('.live-text');
  if (group) group.classList.remove('offline');
  if (dot)   dot.classList.remove('offline');
  if (txt)   txt.textContent = 'Live';
}

function buildCard(cl, data, h) {
  const color  = data ? (colorMap[data.color] || colorMap.green) : '#444';
  const score  = data?.stamina_score ?? null;
  const isHid  = h.has(cl.code);
  const isLive = !!data;
  const div = document.createElement('div');
  div.id = 'c-' + cl.code;
  div.className = 'client-card' + (isHid && !showH ? ' is-hidden' : '');
  div.innerHTML = `
    <div class="card-hdr">
      <div class="card-name">${escapeHtml(cl.name)}</div>
      <div class="card-acts">
        <div class="live-group${isLive ? '' : ' offline'}">
          <div class="status-dot${isLive ? '' : ' offline'}"></div>
          <span class="live-text">${isLive ? 'Live' : 'Offline'}</span>
        </div>
        <button class="icon-btn hide-btn" onclick="toggleHide('${cl.code}')" title="${isHid ? 'Unhide' : 'Hide'}">${isHid ? '○' : '−'}</button>
        <button class="icon-btn" onclick="openRename('${cl.code}')" title="Rename">✎</button>
      </div>
    </div>
    <div class="card-body">
      <div class="bar-outer">
        <div class="bar-fill" style="width:${score ?? 0}%;background:${color}"></div>
        <span class="bar-label">${score !== null ? score + '%' : '--'}</span>
      </div>
    </div>
    <div class="card-footer">
      <button class="remove-btn" onclick="removeClient('${cl.code}')">Remove</button>
    </div>`;
  return div;
}

function checkEmpty() {
  const grid = document.getElementById('clients-grid');
  const cards = grid.querySelectorAll('.client-card');
  let empty = grid.querySelector('.empty-state');
  if (cards.length === 0) {
    if (!empty) {
      empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-title">No clients yet</div><div class="empty-sub">Enter a share code above to get started</div>';
      grid.appendChild(empty);
    }
  } else {
    if (empty) empty.remove();
  }
}

function updateStats() {
  const clients = gc();
  document.getElementById('client-count').textContent = clients.length;
  document.getElementById('clients-grid').classList.toggle('cols-3', clients.length >= 5);
  const scores = [];
  document.querySelectorAll('.client-card:not(.is-hidden)').forEach(card => {
    const lbl = card.querySelector('.bar-label');
    if (lbl) { const v = parseInt(lbl.textContent); if (!isNaN(v)) scores.push(v); }
  });
  document.getElementById('avg-health').textContent = scores.length
    ? Math.round(scores.reduce((a,b) => a+b) / scores.length) + '%'
    : '--';
  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
}

async function renderClients() {
  const grid    = document.getElementById('clients-grid');
  const clients = gc();
  const h       = gh();

  if (!clients.length) { grid.innerHTML = ''; checkEmpty(); updateStats(); return; }

  const results = await Promise.all(clients.map(async cl => ({ cl, data: await fetchData(cl.code) })));
  const codes   = new Set(clients.map(c => c.code));

  grid.querySelectorAll('.client-card').forEach(card => {
    if (!codes.has(card.id.replace('c-',''))) card.remove();
  });

  results.forEach(({ cl, data }) => {
    let card = document.getElementById('c-' + cl.code);
    if (!card) {
      card = buildCard(cl, data, h);
      grid.appendChild(card);
    } else {
      patchCard(card, data);
      setHidden(card, cl.code, h);
    }
  });

  checkEmpty(); updateStats();
}

function clearAll() {
  if (!confirm('Remove all clients?')) return;
  localStorage.removeItem(CK); localStorage.removeItem(HK);
  document.getElementById('clients-grid').innerHTML = '';
  checkEmpty(); updateStats(); stopTimer();
  toast('Cleared');
}

function startTimer() { if (!timer) timer = setInterval(renderClients, 10000); }
function stopTimer()  { clearInterval(timer); timer = null; }
function refreshClients() { toast('Refreshing…'); renderClients(); }

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isErr ? ' err' : '');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('code-input').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});

window.addEventListener('load', () => {
  renderClients();
  if (gc().length) startTimer();
});
window.addEventListener('beforeunload', stopTimer);
</script>
</body>
</html>
