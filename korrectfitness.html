<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Korrect Fitness — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0a0a0a;
      --s1:      #141414;
      --s2:      #1c1c1e;
      --s3:      #242426;
      --b:       rgba(255,255,255,0.07);
      --b2:      rgba(255,255,255,0.12);
      --t1:      #ffffff;
      --t2:      #8e8e93;
      --t3:      #3a3a3c;
      --green:   #30d158;
      --red:     #ff453a;
      --r:       12px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    .navbar {
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--b);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo img { height: 34px; display: block; }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(48,209,88,0.1);
      border: 1px solid rgba(48,209,88,0.22);
      border-radius: 20px;
      padding: 4px 12px 4px 9px;
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* PAGE */
    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.75rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .stat-card {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: var(--r);
      padding: 1.25rem 1.5rem;
    }
    .stat-val {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 5px;
    }
    .stat-lbl {
      font-size: 12px;
      font-weight: 500;
      color: var(--t2);
    }

    /* ADD CLIENT */
    .add-section {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: var(--r);
      padding: 1.25rem 1.5rem;
    }
    .add-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 0.65rem;
    }
    .add-form {
      display: flex;
      gap: 0.65rem;
      align-items: center;
    }
    .field {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 8px;
      color: var(--t1);
      font-family: inherit;
      font-size: 14px;
      padding: 9px 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field::placeholder { color: var(--t3); }
    .field:focus { border-color: rgba(255,255,255,0.3); }
    #code-input {
      width: 150px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }
    #name-input { flex: 1; max-width: 240px; }
    .add-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.82; }

    /* CLIENTS SECTION */
    .clients-section {
      background: var(--s1);
      border: 1px solid var(--b);
      border-radius: var(--r);
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--b);
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
    }
    .hdr-btns { display: flex; gap: 0.5rem; }
    .ghost-btn {
      background: transparent;
      border: 1px solid var(--b2);
      border-radius: 7px;
      color: var(--t2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ghost-btn:hover { background: var(--s2); color: var(--t1); border-color: var(--b2); }
    .ghost-btn.on { background: var(--s2); color: var(--t1); }

    /* GRID — 2 columns default, 3 when many clients */
    .clients-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      padding: 1.25rem;
      gap: 1rem;
    }
    .clients-grid.cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    /* EMPTY */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 2rem;
    }
    .empty-title { font-size: 14px; font-weight: 500; color: var(--t2); margin-bottom: 4px; }
    .empty-sub { font-size: 12px; color: var(--t3); }

    /* CLIENT CARD */
    .client-card {
      background: var(--s2);
      border: 1px solid var(--b);
      border-radius: 12px;
      padding: 1.25rem 1.35rem 1.1rem;
      position: relative;
      transition: background 0.15s;
    }
    .client-card:hover { background: var(--s3); }

    /* hidden */
    .client-card.is-hidden { opacity: 0.35; }
    .client-card.is-hidden .card-body,
    .client-card.is-hidden .card-footer { display: none; }
    .client-card.is-hidden .card-hdr { margin-bottom: 0; }

    .card-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .card-name {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-acts {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* Live badge + dot grouped */
    .live-group {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(48,209,88,0.1);
      border: 1px solid rgba(48,209,88,0.22);
      border-radius: 20px;
      padding: 3px 9px 3px 7px;
    }
    .live-group.offline {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.1);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--t3); }
    .live-text {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 0.2px;
    }
    .live-group.offline .live-text { color: var(--t2); }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--b2);
      border-radius: 8px;
      color: var(--t2);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--t1); background: var(--s3); }

    /* Health — full-width pill bar with % inside, IRL Health Bar style */
    .card-body { margin-bottom: 0.85rem; }
    .bar-outer {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      height: 56px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      min-width: 72px;
    }
    .bar-label {
      position: absolute;
      top: 50%;
      left: 18px;
      transform: translateY(-50%);
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      pointer-events: none;
    }

    .card-footer { margin-top: 0.85rem; }
    .remove-btn {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid var(--b);
      border-radius: 7px;
      color: var(--t3);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .remove-btn:hover { border-color: var(--red); color: var(--red); }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #1c1c1e;
      border: 1px solid var(--b2);
      border-radius: 16px;
      padding: 1.75rem;
      width: 320px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.2s ease;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--t2); margin-bottom: 1.1rem; }
    .modal-input {
      width: 100%;
      background: var(--s1);
      border: 1px solid var(--b2);
      border-radius: 8px;
      color: var(--t1);
      font-family: inherit;
      font-size: 15px;
      padding: 10px 13px;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: rgba(255,255,255,0.28); }
    .modal-btns { display: flex; gap: 0.65rem; }
    .modal-cancel {
      flex: 1; padding: 9px;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 8px;
      color: var(--t2);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }
    .modal-cancel:hover { color: var(--t1); }
    .modal-confirm {
      flex: 1; padding: 9px;
      background: #fff;
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-confirm:hover { opacity: 0.84; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #2c2c2e;
      border: 1px solid var(--b2);
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--t1);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: all 0.22s ease;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { color: var(--red); }

    @media (max-width: 700px) {
      .page { padding: 1rem; }
      .stats { grid-template-columns: 1fr 1fr; }
      .add-form { flex-wrap: wrap; }
      #code-input, #name-input { max-width: 100%; width: 100%; flex: unset; }
      .add-btn { width: 100%; }
      .clients-grid,
      .clients-grid.cols-3 { grid-template-columns: 1fr; padding: 0.75rem; gap: 0.75rem; }
    }
  </style>
</head>

<div class="page">

  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="client-count">0</div>
      <div class="stat-lbl">Active Clients</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="avg-health">--</div>
      <div class="stat-lbl">Group Avg Health</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="last-refresh">--</div>
      <div class="stat-lbl">Last Update</div>
    </div>
  </div>

  <div class="add-section">
    <div class="add-label">Add Client</div>
    <form class="add-form" onsubmit="event.preventDefault(); handleAdd();">
      <input id="code-input" class="field" type="text" placeholder="Share Code" maxlength="8" required autocomplete="off" />
      <input id="name-input" class="field" type="text" placeholder="Name (optional)" autocomplete="off" />
      <button type="submit" class="add-btn">Add</button>
    </form>
  </div>

  <div class="clients-section">
    <div class="section-header">
      <span class="section-title">Clients</span>
      <div class="hdr-btns">
        <button class="ghost-btn" id="show-hidden-btn" onclick="toggleShowHidden()">Show Hidden</button>
        <button class="ghost-btn" onclick="refreshClients()">Refresh</button>
        <button class="ghost-btn" onclick="clearAll()">Clear All</button>
      </div>
    </div>
    <div id="clients-grid" class="clients-grid"></div>
  </div>

</div>

<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <div class="modal-title">Rename Client</div>
    <div class="modal-sub">Update the display name for this client</div>
    <input class="modal-input" id="modal-input" placeholder="Name" maxlength="40" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API  = 'https://stamina-api.onrender.com';
  const CK   = 'kf_clients';
  const HK   = 'kf_hidden';
  let timer  = null;
  let showH  = false;
  let renaming = null;

  // Escapes strings before inserting into innerHTML — prevents XSS
function escapeHtml(str) {
  const map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
  return String(str).replace(/[&<>"']/g, c => map[c]);
}

  const colorMap = {
    'blue':         '#1f6feb',
    'green':        '#30d158',
    'green-yellow': '#7ac943',
    'yellow':       '#ffd60a',
    'yellow-orange':'#ff9f0a',
    'orange':       '#ff6b00',
    'red':          '#ff453a'
  };

  const gc = ()    => JSON.parse(localStorage.getItem(CK) || '[]');
  const sc = v     => localStorage.setItem(CK, JSON.stringify(v));
  const gh = ()    => new Set(JSON.parse(localStorage.getItem(HK) || '[]'));
  const sh = v     => localStorage.setItem(HK, JSON.stringify([...v]));

  async function handleAdd() {
    const ci = document.getElementById('code-input');
    const ni = document.getElementById('name-input');
    const code = ci.value.trim().toUpperCase();
    const name = ni.value.trim();
    if (!/^[A-Z0-9]{8}$/.test(code)) { toast('Enter a valid 8-character code', true); return; }
    const clients = gc();
    if (clients.some(c => c.code === code)) { toast('Already added', true); return; }
    try {
      const r = await fetch(`${API}/${code}`);
      if (!r.ok) throw new Error('Code not found');
      clients.push({ code, name: name || 'Client ' + code.slice(0,4), addedAt: Date.now() });
      sc(clients);
      ci.value = ''; ni.value = '';
      toast('Client added');
      await renderClients();
      startTimer();
    } catch(e) { toast(e.message, true); }
  }

  function removeClient(code) {
    if (!confirm('Remove this client?')) return;
    const h = gh(); h.delete(code); sh(h);
    sc(gc().filter(c => c.code !== code));
    const card = document.getElementById('c-' + code);
    if (card) card.remove();
    if (!gc().length) stopTimer();
    updateStats();
    checkEmpty();
    toast('Client removed');
  }

  function toggleHide(code) {
    const h = gh();
    h.has(code) ? h.delete(code) : h.add(code);
    sh(h);
    const card = document.getElementById('c-' + code);
    if (card) setHidden(card, code, h);
  }

  function setHidden(card, code, h) {
    const isHid = h.has(code);
    card.classList.toggle('is-hidden', isHid && !showH);
    const btn = card.querySelector('.hide-btn');
    if (btn) btn.textContent = isHid ? '○' : '−';
    btn && (btn.title = isHid ? 'Unhide' : 'Hide');
  }

  function toggleShowHidden() {
    showH = !showH;
    const btn = document.getElementById('show-hidden-btn');
    btn.classList.toggle('on', showH);
    btn.textContent = showH ? 'Hide Hidden' : 'Show Hidden';
    const h = gh();
    document.querySelectorAll('.client-card').forEach(card => {
      setHidden(card, card.id.replace('c-',''), h);
    });
  }

  function openRename(code) {
    renaming = code;
    const c = gc().find(c => c.code === code);
    document.getElementById('modal-input').value = c ? c.name : '';
    document.getElementById('rename-modal').classList.add('open');
    setTimeout(() => document.getElementById('modal-input').focus(), 50);
  }
  function closeModal() {
    document.getElementById('rename-modal').classList.remove('open');
    renaming = null;
  }
  function confirmRename() {
    if (!renaming) return;
    const val = document.getElementById('modal-input').value.trim();
    if (!val) { toast('Enter a name', true); return; }
    const clients = gc();
    const c = clients.find(c => c.code === renaming);
    if (c) { c.name = val; sc(clients); }
    const el = document.querySelector('#c-' + renaming + ' .card-name');
    if (el) el.textContent = val;
    closeModal();
    toast('Renamed');
  }
  document.getElementById('modal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmRename();
    if (e.key === 'Escape') closeModal();
  });
  document.getElementById('rename-modal').addEventListener('click', e => {
    if (e.target.id === 'rename-modal') closeModal();
  });

  async function fetchData(code) {
    try {
      const r = await fetch(`${API}/${code}`);
      return r.ok ? await r.json() : null;
    } catch { return null; }
  }

  function patchCard(card, data) {
    if (!data) return;
    const color = colorMap[data.color] || colorMap.green;
    const fill  = card.querySelector('.bar-fill');
    const label = card.querySelector('.bar-label');
    if (fill)  { fill.style.width = data.stamina_score + '%'; fill.style.background = color; }
    if (label) { label.textContent = data.stamina_score + '%'; }
    const group = card.querySelector('.live-group');
    const dot   = card.querySelector('.status-dot');
    const txt   = card.querySelector('.live-text');
    if (group) group.classList.remove('offline');
    if (dot)   dot.classList.remove('offline');
    if (txt)   txt.textContent = 'Live';
  }

  function buildCard(cl, data, h) {
    const color  = data ? (colorMap[data.color] || colorMap.green) : '#444';
    const score  = data?.stamina_score ?? null;
    const isHid  = h.has(cl.code);
    const isLive = !!data;
    const div = document.createElement('div');
    div.id = 'c-' + cl.code;
    div.className = 'client-card' + (isHid && !showH ? ' is-hidden' : '');
    div.innerHTML = `
      <div class="card-hdr">
        <div class="card-name">${escapeHtml(cl.name)}</div>
        <div class="card-acts">
          <div class="live-group${isLive ? '' : ' offline'}">
            <div class="status-dot${isLive ? '' : ' offline'}"></div>
            <span class="live-text">${isLive ? 'Live' : 'Offline'}</span>
          </div>
          <button class="icon-btn hide-btn" onclick="toggleHide('${cl.code}')" title="${isHid ? 'Unhide' : 'Hide'}">${isHid ? '○' : '−'}</button>
          <button class="icon-btn" onclick="openRename('${cl.code}')" title="Rename">✎</button>
        </div>
      </div>
      <div class="card-body">
        <div class="bar-outer">
          <div class="bar-fill" style="width:${score ?? 0}%;background:${color}"></div>
          <span class="bar-label">${score !== null ? score + '%' : '--'}</span>
        </div>
      </div>
      <div class="card-footer">
        <button class="remove-btn" onclick="removeClient('${cl.code}')">Remove</button>
      </div>`;
    return div;
  }

  function checkEmpty() {
    const grid = document.getElementById('clients-grid');
    const cards = grid.querySelectorAll('.client-card');
    let empty = grid.querySelector('.empty-state');
    if (cards.length === 0) {
      if (!empty) {
        empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div class="empty-title">No clients yet</div><div class="empty-sub">Enter a share code above to get started</div>';
        grid.appendChild(empty);
      }
    } else {
      if (empty) empty.remove();
    }
  }

  function updateStats() {
    const clients = gc();
    document.getElementById('client-count').textContent = clients.length;
    document.getElementById('clients-grid').classList.toggle('cols-3', clients.length >= 5);
    const scores = [];
    document.querySelectorAll('.client-card:not(.is-hidden)').forEach(card => {
      const lbl = card.querySelector('.bar-label');
      if (lbl) { const v = parseInt(lbl.textContent); if (!isNaN(v)) scores.push(v); }
    });
    document.getElementById('avg-health').textContent = scores.length ? Math.round(scores.reduce((a,b)=>a+b)/scores.length) + '%' : '--';
    document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  }

  async function renderClients() {
    const grid = document.getElementById('clients-grid');
    const clients = gc();
    const h = gh();

    if (!clients.length) {
      grid.innerHTML = '';
      checkEmpty();
      updateStats();
      return;
    }

    const results = await Promise.all(clients.map(async cl => ({ cl, data: await fetchData(cl.code) })));
    const codes = new Set(clients.map(c => c.code));

    // remove stale
    grid.querySelectorAll('.client-card').forEach(card => {
      if (!codes.has(card.id.replace('c-',''))) card.remove();
    });

    results.forEach(({ cl, data }) => {
      let card = document.getElementById('c-' + cl.code);
      if (!card) {
        card = buildCard(cl, data, h);
        grid.appendChild(card);
      } else {
        patchCard(card, data);
        setHidden(card, cl.code, h);
      }
    });

    checkEmpty();
    updateStats();
  }

  function clearAll() {
    if (!confirm('Remove all clients?')) return;
    localStorage.removeItem(CK);
    localStorage.removeItem(HK);
    document.getElementById('clients-grid').innerHTML = '';
    checkEmpty();
    updateStats();
    stopTimer();
    toast('Cleared');
  }

  function startTimer() { if (!timer) timer = setInterval(renderClients, 10000); }
  function stopTimer()  { clearInterval(timer); timer = null; }
  function refreshClients() { toast('Refreshing…'); renderClients(); }

  function toast(msg, isErr = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (isErr ? ' err' : '');
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2500);
  }

  document.getElementById('code-input').addEventListener('input', function() { this.value = this.value.toUpperCase(); });

  window.addEventListener('load', () => {
    renderClients();
    if (gc().length) startTimer();
  });
  window.addEventListener('beforeunload', stopTimer);
</script>
</body>
</html>
