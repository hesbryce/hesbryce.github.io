<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>Download — IRL Health Bar</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .download-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10rem 40px 6rem 40px;
      text-align: center;
    }

    .download-page h1 {
      font-size: clamp(3rem, 7vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: white;
      margin: 0 0 2rem 0;
    }

    .download-page .subtitle {
      font-size: clamp(1.25rem, 1.8vw, 1.75rem);
      color: rgba(255, 255, 255, 0.65);
      margin: 0 0 6rem 0;
      font-weight: 500;
    }

    .apps-row {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(3rem, 8vw, 8rem);
      justify-content: center;
      align-items: flex-start;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .app-item h2 {
      font-size: clamp(1.5rem, 2.2vw, 2.5rem);
      font-weight: 700;
      color: white;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .app-store-link {
      display: inline-block;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .app-store-link:hover {
      transform: translateY(-3px);
      opacity: 0.9;
    }

    .app-store-link img {
      height: clamp(70px, 7vw, 120px);
      width: auto;
      display: block;
    }

    @media (max-width: 700px) {
      .apps-row {
        gap: 3rem;
      }
      .download-page {
        padding: 6rem 20px 3rem 20px;
      }
      .download-page .subtitle {
        margin-bottom: 3rem;
      }
    }
  </style>
</head>
<body>
  <nav class="modern-navbar">
    <div class="nav-container">
      <button class="hamburger-menu" id="hamburger-menu" onclick="toggleMobileMenu()" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-brand">
        <a href="index.html" style="text-decoration: none;">
          <h1 class="brand-name">IRL Health Bar</h1>
        </a>
      </div>
      <div class="nav-links desktop-only">
        <a href="index.html" class="nav-link">Home</a>
        <a href="professional.html" class="nav-link">Dashboard</a>
      </div>
      <a href="/payment/index.html" class="nav-link nav-cta">Subscribe</a>
    </div>
    <div class="mobile-menu-overlay" id="mobile-menu-overlay" onclick="toggleMobileMenu()"></div>
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-header">
        <h2>Menu</h2>
        <button class="close-menu" onclick="toggleMobileMenu()" aria-label="Close menu">&times;</button>
      </div>
      <div class="mobile-menu-links">
        <a href="index.html" class="mobile-menu-link" onclick="toggleMobileMenu()">Home</a>
        <a href="professional.html" class="mobile-menu-link" onclick="toggleMobileMenu()">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="download-page">
    <h1>Download IRL Health Bar</h1>
    <p class="subtitle">Available now on the App Store for Apple Watch.</p>

    <div class="apps-row">
      <div class="app-item">
        <h2>IRL Health Bar</h2>
        <a href="https://apps.apple.com/us/app/irl-health-bar/id1641032447"
           class="app-store-link"
           target="_blank"
           rel="noopener">
          <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83"
               alt="Download IRL Health Bar on the App Store">
        </a>
      </div>

      <div class="app-item">
        <h2>IRL Health Bar Workout</h2>
        <a href="https://apps.apple.com/us/app/irl-health-bar-workout/id6475403113"
           class="app-store-link"
           target="_blank"
           rel="noopener">
          <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83"
               alt="Download IRL Health Bar Workout on the App Store">
        </a>
      </div>
    </div>
  </main>

  <script>
    function toggleMobileMenu() {
      const hamburger = document.getElementById('hamburger-menu');
      const overlay = document.getElementById('mobile-menu-overlay');
      const menu = document.getElementById('mobile-menu');
      hamburger.classList.toggle('active');
      overlay.classList.toggle('active');
      menu.classList.toggle('active');
      document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : '';
    }

    window.addEventListener('scroll', () => {
      const navbar = document.querySelector('.modern-navbar');
      if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
